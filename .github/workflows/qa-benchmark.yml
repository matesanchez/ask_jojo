name: QA Benchmark (router-only)

on:
  schedule:
    - cron: "0 6 * * *"   # nightly at 06:00 UTC
  workflow_dispatch:

jobs:
  benchmark-router:
    name: benchmark --dry-run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,backend,ingest,qa]"

      - name: Benchmark dry-run (router only)
        run: pytest -q -m benchmark --ignore=packages/jojo_ingest/tests/test_sharepoint.py --ignore=packages/jojo_ingest/tests/test_graph.py
        env:
          JOJO_CONFIG_FORCE_PLAINTEXT: "1"
