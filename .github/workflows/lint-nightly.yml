name: Lint Nightly (simulated)
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e ".[dev,lint]"
      - run: jojo-lint nightly --wiki ask_jojo_wiki/
