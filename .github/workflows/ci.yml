name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: ruff + pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev + backend deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,backend]"
          python -m pip install httpx  # for FastAPI TestClient

      - name: Ruff (lint)
        run: ruff check packages/ src/backend/

      - name: Pytest
        run: pytest -q
